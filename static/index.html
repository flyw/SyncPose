<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncPose Pro</title>
    <style>
        :root { --primary: #007bff; --bg: #0a0a0a; --panel: #161616; --text: #e0e0e0; --success: #28a745; --warning: #ffc107; --border: #282828; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #000; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .status-tag { font-size: 11px; padding: 4px 12px; border-radius: 20px; background: #222; font-weight: bold; }
        
        main { flex: 1; display: flex; overflow: hidden; }
        .preview-container { flex: 3; position: relative; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden; padding: 20px; }
        #video { max-width: 100%; max-height: 100%; display: block; }
        #main-canvas { position: absolute; pointer-events: none; z-index: 5; }
        
        .sidebar { flex: 1; background: var(--panel); border-left: 1px solid #222; display: flex; flex-direction: column; min-width: 380px; max-width: 420px; }
        .tabs { display: flex; background: #000; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: #666; cursor: pointer; font-size: 12px; font-weight: bold; border-bottom: 2px solid transparent; transition: 0.2s; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); background: #111; }
        .tab-content { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .tab-content.active { display: block; }
        
        .control-group { margin-bottom: 20px; background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .control-group h3 { font-size: 13px; margin: 0 0 12px 0; color: #888; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #282828; padding-bottom: 8px; }
        
        .candidate-card { background: #111; border: 1px solid #333; border-radius: 6px; padding: 10px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .candidate-card:hover { border-color: var(--primary); background: #1a1a1a; }
        .candidate-meta { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-top: 5px; }

        .vid-controls-sidebar { background: #000; padding: 15px 20px; border-top: 1px solid #222; }
        .play-btn { background: var(--primary); border: none; color: white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.2s; }
        .nav-btn { background: #1e1e1e; border: 1px solid #333; color: #aaa; border-radius: 4px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .nav-row { display: flex; gap: 6px; margin-bottom: 10px; justify-content: center; }

        .toggle-btn { padding: 8px 12px; border: 1px solid #333; background: #1e1e1e; color: #aaa; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.2s; }
        .toggle-btn:hover { background: #2a2a2a; border-color: var(--primary); }
        .toggle-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
        .toggle-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        .opacity-control { margin-top: 10px; display: none; }
        .opacity-control.visible { display: block; }

        .timeline-container { height: 60px; background: #000; border-top: 1px solid #222; position: relative; padding: 0 20px; display: flex; flex-direction: column; justify-content: center; }
        .timeline-track { width: 100%; height: 20px; background: #1a1a1a; border-radius: 10px; position: relative; cursor: pointer; border: 1px solid #222; }
        .timeline-progress { position: absolute; top: 0; left: 0; height: 100%; background: rgba(0, 123, 255, 0.15); border-right: 2px solid var(--primary); pointer-events: none; z-index: 2; border-radius: 10px 0 0 10px; }
        .marker { position: absolute; top: 0; width: 2px; height: 100%; background: #ff5252; opacity: 0.8; z-index: 1; }
        
        .btn { padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid #333; color: #aaa; flex: 1; }
        .btn-clip { background: #e91e63; color: white; width: 100%; font-size: 14px; padding: 14px; }
        
        .info-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
        .info-val { color: var(--primary); font-weight: bold; font-family: 'Consolas', monospace; }
        label { font-size: 11px; color: #666; margin-bottom: 4px; display: block; }
        input { width: 100%; padding: 8px; background: #111; border: 1px solid #333; color: #fff; border-radius: 4px; font-size: 12px; box-sizing: border-box; }
        input[type="range"] { padding: 0; margin: 10px 0; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; font-size: 16px; letter-spacing: 2px;">SYNC<span style="color: var(--primary);">POSE</span> PRO</div>
        <div class="status-tag" id="server-status">CONNECTING...</div>
    </header>

    <main>
        <div class="preview-container" id="preview-container">
            <video id="video" crossorigin="anonymous" playsinline><source src="/video" type="video/mp4"></video>
            <canvas id="main-canvas"></canvas>
        </div>

        <div class="sidebar">
            <div class="tabs">
                <button class="tab-btn active" id="tab-btn-1" onclick="switchTab(1)">1. Select Baseline</button>
                <button class="tab-btn" id="tab-btn-2" onclick="switchTab(2)">2. Align Motion</button>
                <button class="tab-btn" id="tab-btn-3" onclick="switchTab(3)">3. Clip & Export</button>
            </div>

            <div id="tab1" class="tab-content active">
                <div class="control-group">
                    <h3>🏆 AI Recommended Baseline</h3>
                    <div id="candidates-list"><div style="text-align:center; color:#444; padding:20px;" id="cand-status">Calculating recommendations...</div></div>
                </div>
                <div class="control-group">
                    <h3>🎯 Manual Baseline</h3>
                    <button class="btn btn-primary" onclick="captureCurrentAsBase()">📸 Set Current Frame as Baseline</button>
                    <button class="btn btn-outline" style="margin-top:10px; width:100%;" onclick="checkBackendFrame()">🔍 Verify Backend Frame</button>
                </div>
            </div>

            <div id="tab2" class="tab-content">
                <div class="control-group">
                    <h3>🧬 Visual Comparison</h3>
                    <div style="display: flex; gap: 15px; margin-bottom: 12px; font-size: 10px; color: #666;">
                        <div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;background:#fff;border-radius:50%"></div> Baseline (White)</div>
                        <div style="display:flex;align-items:center;gap:4px;"><div style="width:8px;height:8px;background:#ffc107;border-radius:50%"></div> Current (Yellow)</div>
                    </div>
                    <div class="info-row"><span>Current Fit Score:</span> <span id="fit-score-val" class="info-val">-- %</span></div>
                    <div class="info-row"><span>Ideal Reference Frame:</span> <span id="std-idx-val" class="info-val">--</span></div>

                    <div class="toggle-row" style="margin-top: 15px;">
                        <button class="toggle-btn" id="toggle-keypoints" onclick="toggleKeypoints()">🔘 Keypoints</button>
                        <button class="toggle-btn" id="toggle-stdframe" onclick="toggleStdFrame()">🖼️ Overlay Baseline</button>
                    </div>
                    
                    <div class="opacity-control" id="opacity-control">
                        <label>Overlay Opacity: <span id="opacity-label">50</span>%</label>
                        <input type="range" id="opacity-range" value="50" min="0" max="100" step="5" onchange="updateOpacity()">
                    </div>

                    <label style="margin-top:15px;">Match Threshold (Lower = More Matches): <span id="threshold-label">92.0</span>%</label>
                    <input type="range" id="threshold-range" value="92.0" min="80" max="99" step="0.5" onchange="updateThreshold()">
                </div>
                <div class="control-group">
                    <h3>🔍 Jump to Marker</h3>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-outline" id="prev-btn" onclick="jumpSimilar(-1)">⏮ Previous</button>
                        <button class="btn btn-outline" id="next-btn" onclick="jumpSimilar(1)">Next ⏭</button>
                    </div>
                    <button class="btn btn-primary" onclick="togglePlay()" style="background: var(--success); margin-top: 10px;">🔊 Preview This Segment</button>
                </div>
            </div>

            <div id="tab3" class="tab-content">
                <div class="control-group">
                    <h3>🎬 Auto Clip Export</h3>
                    <label>Clip Duration (sec):</label>
                    <input type="number" id="clip-duration" value="5.0" step="0.1">
                    <label style="margin-top:8px;">File Name:</label>
                    <input type="text" id="clip-name" placeholder="aligned_export">
                    <button class="btn btn-clip" onclick="clipVideo()" style="margin-top:15px;">Start Export</button>
                    <div id="clip-status" style="font-size: 11px; margin-top: 10px; text-align: center;"></div>
                </div>
            </div>

            <div class="vid-controls-sidebar">
                <div class="nav-row">
                    <button class="nav-btn" onclick="returnToLastStart()" title="Return to last start point">↺</button>
                    <button class="nav-btn" onclick="prevFrame()">⏮</button>
                    <button class="play-btn" onclick="togglePlay()" id="play-btn">▶</button>
                    <button class="nav-btn" onclick="nextFrame()">⏭</button>
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between; gap: 15px;">
                    <div style="flex: 1; text-align: right;">
                        <div style="font-size: 14px; font-weight: bold; color: var(--primary);" id="cur-frame-label">0</div>
                        <div style="font-size: 10px; color: #555;">FRAME / <span id="total-frame-label">--</span></div>
                    </div>
                    <div style="text-align: right; min-width: 80px;">
                        <div style="font-size: 14px; font-weight: bold; color: #fff;" id="time-ms-label">00:00</div>
                        <div style="font-size: 10px; color: #555;"><span id="time-label">0.000</span> SEC</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="timeline-container">
        <div class="timeline-track" id="timeline-track" onclick="seekTimeline(event)">
            <div class="timeline-progress" id="timeline-progress"></div>
            <div id="markers-layer"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const mainCanvas = document.getElementById('main-canvas');
        const mainCtx = mainCanvas.getContext('2d');
        const track = document.getElementById('timeline-track');
        const progress = document.getElementById('timeline-progress');
        const markersLayer = document.getElementById('markers-layer');
        const statusEl = document.getElementById('server-status');

        let fps = 30, totalFrames = 0, similar_frames_data = [], isVideoReady = false;
        let averagePose = null, currentFrameLandmarks = null, currentFrameScore = 0, activeTab = 1, candidatesLoaded = false;
        let showKeypoints = true, showStdFrame = false, stdFrameOpacity = 0.5;
        let stdFrameLandmarks = null, stdFrameImage = null;

        const CONNECTIONS = [[0,1],[1,2],[2,3],[3,7],[0,4],[4,5],[5,6],[6,8],[9,10],[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[24,26],[25,27],[26,28]];

        function switchTab(n) { activeTab = n; document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i+1 === n)); document.querySelectorAll('.tab-content').forEach((c, i) => c.classList.toggle('active', i+1 === n)); }
        function initCanvas() { if (!video.videoWidth) return; mainCanvas.width = video.videoWidth; mainCanvas.height = video.videoHeight; isVideoReady = true; requestAnimationFrame(renderLoop); }
        video.onloadedmetadata = initCanvas;
        video.onseeked = fetchCurrentFrameData;

        let lastPlaybackStartTime = 0;

        function togglePlay() { 
            if (video.paused) {
                lastPlaybackStartTime = video.currentTime;
                video.play();
            } else {
                video.pause();
            }
        }
        
        function returnToLastStart() {
            video.pause();
            video.currentTime = lastPlaybackStartTime;
        }

        video.onplay = () => { document.getElementById('play-btn').innerText = '⏸'; };
        video.onpause = () => { document.getElementById('play-btn').innerText = '▶'; };
        function prevFrame() { video.currentTime = Math.max(0, video.currentTime - 1/fps); }
        function nextFrame() { video.currentTime = Math.min(video.duration, video.currentTime + 1/fps); }

        function toggleKeypoints() {
            showKeypoints = !showKeypoints;
            document.getElementById('toggle-keypoints').classList.toggle('active', showKeypoints);
        }

        function toggleStdFrame() {
            showStdFrame = !showStdFrame;
            document.getElementById('toggle-stdframe').classList.toggle('active', showStdFrame);
            document.getElementById('opacity-control').classList.toggle('visible', showStdFrame);
            if (showStdFrame && !stdFrameLandmarks) {
                fetchStdFrame();
            }
        }

        function updateOpacity() {
            const val = document.getElementById('opacity-range').value;
            document.getElementById('opacity-label').innerText = val;
            stdFrameOpacity = parseInt(val) / 100;
        }

        async function fetchStdFrame() {
            try {
                const stdIdx = document.getElementById('std-idx-val').innerText;
                if (stdIdx && stdIdx !== '--') {
                    // Fetch landmarks
                    const res = await fetch(`/api/frame_data/${stdIdx}`);
                    const data = await res.json();
                    stdFrameLandmarks = data.landmarks;
                    
                    // Fetch image
                    const img = new Image();
                    img.src = `/api/frame_image/${stdIdx}`;
                    img.onload = () => { stdFrameImage = img; };
                }
            } catch (e) {
                console.error('Failed to fetch standard frame:', e);
            }
        }

        async function fetchCurrentFrameData() {
            const idx = Math.round(video.currentTime * fps);
            try { 
                const res = await fetch(`/api/frame_data/${idx}`); 
                const data = await res.json(); 
                currentFrameLandmarks = data.landmarks; 
                currentFrameScore = data.score || 0;
            } catch (e) {}
        }

        function renderLoop() { if (isVideoReady) { syncCanvas(); drawOverlay(); } updateUI(); requestAnimationFrame(renderLoop); }

        function syncCanvas() {
            const container = document.getElementById('preview-container');
            const vW = video.videoWidth, vH = video.videoHeight, cW = container.clientWidth - 40, cH = container.clientHeight - 40;
            const vRatio = vW / vH, cRatio = cW / cH;
            let dW, dH, dL, dT;
            if (cRatio > vRatio) { dH = cH; dW = dH * vRatio; } else { dW = cW; dH = dW / vRatio; }
            dL = (container.clientWidth - dW) / 2; dT = (container.clientHeight - dH) / 2;
            mainCanvas.style.width = dW + 'px'; mainCanvas.style.height = dH + 'px';
            mainCanvas.style.left = dL + 'px'; mainCanvas.style.top = dT + 'px';
        }

        function drawOverlay() {
            mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            
            if (showStdFrame && stdFrameImage && activeTab === 2) {
                mainCtx.save();
                mainCtx.globalAlpha = stdFrameOpacity;
                mainCtx.drawImage(stdFrameImage, 0, 0, mainCanvas.width, mainCanvas.height);
                mainCtx.restore();
            }

            if (showKeypoints) {
                if (showStdFrame && stdFrameLandmarks && activeTab === 2) {
                    mainCtx.globalAlpha = stdFrameOpacity;
                    drawPose(mainCtx, stdFrameLandmarks, '#ffffff', 5);
                    mainCtx.globalAlpha = 1.0;
                }
                
                const refColor = (activeTab === 1) ? '#28a745' : '#ffffff';
                if (averagePose) {
                    if (activeTab === 2 && showStdFrame) {
                        mainCtx.globalAlpha = 0.3;
                        drawPose(mainCtx, averagePose, refColor, 5);
                        mainCtx.globalAlpha = 1.0;
                    } else {
                        drawPose(mainCtx, averagePose, refColor, 5);
                    }
                }
                
                if (currentFrameLandmarks) {
                    drawPose(mainCtx, currentFrameLandmarks, '#ffc107', 8);
                }
            }
        }

        function drawPose(ctx, lms, color, radius) {
            ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 4;
            CONNECTIONS.forEach(([i, j]) => {
                const p1 = lms[i], p2 = lms[j];
                if (p1[3] > 0.5 && p2[3] > 0.5) {
                    ctx.beginPath(); ctx.moveTo(p1[0] * mainCanvas.width, p1[1] * mainCanvas.height);
                    ctx.lineTo(p2[0] * mainCanvas.width, p2[1] * mainCanvas.height); ctx.stroke();
                }
            });
            lms.forEach(p => { if (p[3] > 0.5) { ctx.beginPath(); ctx.arc(p[0] * mainCanvas.width, p[1] * mainCanvas.height, radius, 0, Math.PI*2); ctx.fill(); } });
        }

        function updateUI() {
            const curFrame = Math.round(video.currentTime * fps);
            document.getElementById('cur-frame-label').innerText = curFrame;
            document.getElementById('time-label').innerText = video.currentTime.toFixed(3);
            
            const m = Math.floor(video.currentTime / 60);
            const s = Math.floor(video.currentTime % 60);
            document.getElementById('time-ms-label').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            if (video.duration) progress.style.width = (video.currentTime / video.duration) * 100 + '%';
            
            if (currentFrameScore > 0) {
                document.getElementById('fit-score-val').innerText = currentFrameScore.toFixed(2) + "%";
            }

            if (similar_frames_data.length > 0) {
                const prev = [...similar_frames_data].reverse().find(f => f.frame_index < curFrame - 5);
                const next = similar_frames_data.find(f => f.frame_index > curFrame + 5);
                document.getElementById('prev-btn').innerText = prev ? `⏮ Previous (${prev.frame_index})` : "⏮ None";
                document.getElementById('prev-btn').disabled = !prev;
                document.getElementById('next-btn').innerText = next ? `Next (${next.frame_index}) ⏭` : "None ⏭";
                document.getElementById('next-btn').disabled = !next;
            }
        }

        async function updateStatus() {
            try {
                const res = await fetch('/api/status'); const data = await res.json();
                fps = data.fps || 30; totalFrames = data.total_frames || 0;
                document.getElementById('total-frame-label').innerText = totalFrames;
                if (data.step < 5) {
                    statusEl.innerText = `STEP ${data.step}/4: ${data.step_desc} (${data.progress}%)`;
                    document.getElementById('cand-status').innerText = `${data.step_desc} (${data.progress}%)`;
                } else {
                    if (statusEl.innerText.indexOf('READY') === -1) {
                        statusEl.innerText = "READY / ALIGNED"; statusEl.style.background = "#28a745";
                        averagePose = data.average_pose; similar_frames_data = data.similar_frames;
                        document.getElementById('std-idx-val').innerText = data.best_frame_idx;
                        fetchStdFrame();
                        renderCandidates(data.candidates); renderMarkers();
                    }
                }
                setTimeout(updateStatus, data.step < 5 ? 1000 : 10000);
            } catch (e) { setTimeout(updateStatus, 3000); }
        }

        function renderCandidates(list) {
            if (!list || list.length === 0 || candidatesLoaded) return;
            document.getElementById('candidates-list').innerHTML = list.map(c => `
                <div class="candidate-card" onclick="selectCandidate(${c.idx}, ${c.timestamp})">
                    <div style="font-weight:bold; color:var(--primary)">Recommended: ${c.idx}</div>
                    <div class="candidate-meta"><span>Time: ${c.timestamp.toFixed(2)}s</span><span>Fit: ${(c.score).toFixed(1)}%</span></div>
                    <button class="btn btn-primary" style="padding:4px; margin-top:8px; font-size:10px;" onclick="confirmCandidate(event, ${c.idx})">Set as Baseline</button>
                </div>
            `).join('');
            candidatesLoaded = true;
        }

        function selectCandidate(idx, ts) { video.currentTime = ts; }
        async function captureCurrentAsBase() { await confirmCandidate(null, Math.round(video.currentTime * fps)); }

        async function confirmCandidate(e, idx) {
            if(e) e.stopPropagation();
            video.currentTime = idx / fps;
            statusEl.innerText = "RE-CALIBRATING...";
            const threshold = document.getElementById('threshold-range').value;
            const res = await fetch('/api/re-sync', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ frame_index: idx, threshold: parseFloat(threshold) }) });
            const data = await res.json();
            averagePose = data.average_pose; similar_frames_data = data.similar_frames;
            document.getElementById('std-idx-val').innerText = idx;
            fetchStdFrame();
            renderMarkers(); statusEl.innerText = "READY / ALIGNED";
            switchTab(2);
        }

        async function updateThreshold() {
            const val = document.getElementById('threshold-range').value;
            document.getElementById('threshold-label').innerText = val;
            const idx = parseInt(document.getElementById('std-idx-val').innerText);
            if (!isNaN(idx)) await confirmCandidate(null, idx);
        }

        function checkBackendFrame() { window.open(`/api/frame_image/${Math.round(video.currentTime * fps)}`, '_blank'); }
        function renderMarkers() { markersLayer.innerHTML = ''; similar_frames_data.forEach(f => {
            const m = document.createElement('div'); m.className = 'marker'; m.style.left = (f.frame_index / totalFrames) * 100 + '%'; markersLayer.appendChild(m);
        }); }
        function jumpSimilar(dir) {
            const curFrame = Math.round(video.currentTime * fps);
            const target = dir > 0 ? similar_frames_data.find(f => f.frame_index > curFrame + 5) : [...similar_frames_data].reverse().find(f => f.frame_index < curFrame - 5);
            if (target) video.currentTime = target.timestamp;
        }
        function seekTimeline(e) { const rect = track.getBoundingClientRect(); video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration; }
        async function clipVideo() {
            const statusBox = document.getElementById('clip-status'); statusBox.innerText = "EXPORTING...";
            try {
                const res = await fetch('/api/clip', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ start_time: video.currentTime, duration: parseFloat(document.getElementById('clip-duration').value), name: document.getElementById('clip-name').value || "aligned" }) });
                const data = await res.json(); statusBox.innerText = "SUCCESS!";
                const link = document.createElement('a'); link.href = data.download_url; link.download = "clip.mp4"; link.click();
            } catch (e) { statusBox.innerText = "FAILED"; }
        }
        
        document.getElementById('toggle-keypoints').classList.add('active');
        updateStatus();
    </script>
</body>
</html>
